  QUICK STEPS
  ──────────────────────────────────────────────────────────────────────────
  1. Go to https://www.emailjs.com  →  Sign Up (free, 200 emails/month)
  2. Dashboard → Email Services → Add New Service → choose Gmail
     → connect starconnecthub@gmail.com → Save → copy the Service ID
  3. Dashboard → Email Templates → Create New Template (×2)
     → paste the HTML below into each template's HTML editor
     → Save → copy the Template ID for each
  4. Dashboard → Account → General → copy your Public Key
  5. Open star-connect-hub.html, find the 4 constants near the top of <script>
     and replace the placeholder strings:

       const EJ_PUBLIC_KEY  = 'paste_your_public_key_here';
       const EJ_SERVICE_ID  = 'paste_your_service_id_here';
       const EJ_VERIFY_TID  = 'paste_verification_template_id_here';
       const EJ_WELCOME_TID = 'paste_welcome_template_id_here';

  Name it: "SCH Verification Code"
  Subject line (in EmailJS): Your Star Connect Hub verification code: {{otp_code}}
  To email (in EmailJS): {{to_email}}

-->

<template id="verify">
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0E0814;font-family:'Helvetica Neue',Arial,sans-serif">

    <tr><td align="center">
      <table width="580" cellpadding="0" cellspacing="0" style="max-width:580px;background:#170E22;border-radius:16px;overflow:hidden;border:1px solid rgba(232,196,150,.18)">

        <!-- header -->
        <tr><td style="background:linear-gradient(135deg,#E14E7B,#7B4FE0);padding:32px 40px;text-align:center">
          <div style="font-size:28px;margin-bottom:6px">⭐</div>
          <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-.3px">Star Connect Hub</h1>
          <p style="margin:6px 0 0;color:rgba(255,255,255,.75);font-size:13px">Verified creators · Real connection</p>
        </td></tr>

        <!-- body -->
        <tr><td style="padding:40px 40px 32px">
          <p style="margin:0 0 6px;color:#E2B877;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">Email Verification</p>
          <h2 style="margin:0 0 16px;color:#F0D6AE;font-size:22px;font-weight:600">Hi {{to_name}}, here's your code</h2>
          <p style="margin:0 0 28px;color:#a899be;font-size:15px;line-height:1.65">To complete your Star Connect Hub account, enter the 6-digit verification code below. It expires in <strong style="color:#E2B877">10 minutes</strong>.</p>

          <!-- OTP box -->
          <table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:0 0 28px">
            <div style="display:inline-block;background:linear-gradient(135deg,rgba(226,184,119,.15),rgba(225,78,123,.1));border:2px solid rgba(226,184,119,.4);border-radius:12px;padding:22px 48px">

          <p style="margin:0;color:#a899be;font-size:14px;line-height:1.6">Need help? Reply to this email or contact <a href="mailto:starconnecthub@gmail.com" style="color:#E2B877;text-decoration:none">starconnecthub@gmail.com</a>.</p>

          <p style="margin:0;color:#5a4d6e;font-size:12px;text-align:center;line-height:1.6">© 2026 Star Connect Hub · <a href="https://starconnecthub.com" style="color:#5a4d6e;text-decoration:none">starconnecthub.com</a><br>This is a transactional email related to your account security.</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
</template>
